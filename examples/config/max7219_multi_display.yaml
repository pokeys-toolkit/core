# MAX7219 Multi-Display Configuration Example
# This configuration demonstrates how to set up multiple MAX7219 displays
# using individual CS pins (no daisy chaining) to avoid PoKeys SPI limitations

metadata:
  version: "1.0"
  description: "MAX7219 multi-display setup with individual CS pins"
  author: "PoKeys Configuration System"
  created: "2024-07-27T08:00:00Z"
  notes: |
    This configuration solves the "partial segments on Display 1" issue by using
    individual CS pins instead of daisy chaining. PoKeys has a 2-byte SPI command
    limit which prevents traditional MAX7219 daisy chaining.

system:
  polling_interval_ms: 100
  log_level: info
  enable_threading: true
  thread_pool_size: 4

devices:
  main_controller:
    name: "Main PoKeys Controller"
    description: "Primary controller with MAX7219 displays"
    serial_number: 32218
    connection:
      connection_type: usb
      usb:
        serial_number: 32218
        timeout_ms: 3000
    
    # SPI Configuration
    spi:
      name: "Main SPI Bus"
      description: "SPI bus for MAX7219 displays"
      prescaler: 0x04
      mode: 0x00
      enabled: true
      notes: "Configured for MAX7219 compatibility"
    
    # Individual MAX7219 Display Configurations
    max7219_displays:
      display_left:
        name: "Left Display"
        description: "Left-side status display"
        cs_pin: 24
        intensity: 8
        raw_segments: true
        digits: 8
        enabled: true
        initial_text: "READY"
        notes: "Primary status display"
      
      display_right:
        name: "Right Display"
        description: "Right-side counter display"
        cs_pin: 26
        intensity: 10
        raw_segments: false
        digits: 8
        enabled: true
        initial_number: 0
        notes: "Counter display for production count"
    
    # Multi-Display Group Configuration
    max7219_multi:
      status_panel:
        name: "Status Panel"
        description: "Coordinated status display panel"
        enabled: true
        synchronized: true
        displays:
          - name: "Status Left"
            description: "Left status section"
            cs_pin: 24
            intensity: 8
            raw_segments: true
            digits: 8
            enabled: true
            initial_text: "STATUS"
          
          - name: "Status Right"
            description: "Right status section"
            cs_pin: 26
            intensity: 8
            raw_segments: true
            digits: 8
            enabled: true
            initial_text: "READY"
        notes: |
          This multi-display group allows coordinated control of both displays
          for synchronized status updates and animations.
      
      production_counters:
        name: "Production Counters"
        description: "Production line counters"
        enabled: true
        synchronized: false
        displays:
          - name: "Good Parts"
            description: "Good parts counter"
            cs_pin: 24
            intensity: 12
            raw_segments: false
            digits: 8
            enabled: true
            initial_number: 0
          
          - name: "Reject Parts"
            description: "Rejected parts counter"
            cs_pin: 26
            intensity: 12
            raw_segments: false
            digits: 8
            enabled: true
            initial_number: 0
        notes: |
          Independent counters for production tracking.
          Not synchronized to allow independent updates.
    
    # Pin Configurations for other I/O
    pins:
      1:
        name: "Start Button"
        description: "Production start button"
        function: digital_input
        enabled: true
        pull_up: true
        notes: "Active low start button"
      
      2:
        name: "Stop Button"
        description: "Emergency stop button"
        function: digital_input
        enabled: true
        pull_up: true
        notes: "Active low emergency stop"
      
      3:
        name: "Status LED"
        description: "System status indicator"
        function: digital_output
        enabled: true
        initial_state: false
        notes: "Green LED for system ready"
      
      4:
        name: "Error LED"
        description: "Error indicator"
        function: digital_output
        enabled: true
        initial_state: false
        notes: "Red LED for error conditions"
      
      # SPI pins are automatically configured when SPI is enabled
      # Pin 23 (MOSI) and Pin 25 (CLK) are reserved for SPI
      # These pins should not be configured for other functions
      23:
        name: "SPI MOSI"
        description: "SPI Master Out Slave In"
        function: SpiMosi
        enabled: true
        notes: "Reserved for SPI communication - automatically configured"
      
      25:
        name: "SPI CLK"
        description: "SPI Clock Signal"
        function: SpiClock
        enabled: true
        notes: "Reserved for SPI communication - automatically configured"
    
    # Encoder for manual adjustments
    encoders:
      adjustment_encoder:
        name: "Manual Adjustment"
        description: "Manual counter adjustment encoder"
        pin_a: 10
        pin_b: 11
        enabled: true
        sampling_4x: true
        resolution: 100
        initial_position: 0
        notes: "Rotary encoder for manual count adjustments"
    
    # PWM for LED brightness control
    pwm:
      status_brightness:
        name: "Status LED Brightness"
        description: "PWM control for status LED brightness"
        pin: 15
        frequency_hz: 1000
        initial_duty_cycle: 50.0
        enabled: true
        notes: "Controls brightness of status indicators"
    
    # Device settings
    settings:
      enable_failsafe: true
      failsafe_timeout_ms: 5000
      enable_watchdog: true
      watchdog_timeout_ms: 1000
    
    notes: |
      This device configuration demonstrates the complete setup for MAX7219
      multi-display control using individual CS pins. This approach:
      
      1. Avoids PoKeys 2-byte SPI command limitation
      2. Eliminates partial segments on Display 1
      3. Provides full independent control of each display
      4. Supports both individual and coordinated display operations
      5. Scales easily to additional displays with more CS pins
      
      Hardware connections:
      - Display 0: CS pin 24, shared MOSI/CLK
      - Display 1: CS pin 26, shared MOSI/CLK
      - No DOUT→DIN connections between displays
      
      SPI Pin Requirements:
      - Pin 23 (MOSI): Reserved for SPI Master Out Slave In
      - Pin 25 (CLK): Reserved for SPI Clock Signal
      - These pins are automatically configured when SPI is enabled
      - Do not use pins 23 or 25 for CS pins or other functions
      
      Available CS pins for MAX7219 displays:
      - Any pin except 23 (MOSI) and 25 (CLK)
      - Recommended: 24, 26, 27, 28, etc.
      
      This configuration can be loaded and applied using:
      pokeys config apply max7219_multi_display.yaml
